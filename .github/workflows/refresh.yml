name: Refresh games data

# Runs every 2 days (days 1,3,5,… at 06:00 UTC) and on manual dispatch.
on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape astrocade.com homepage
        run: node scripts/scrape.mjs

      - name: Commit if data changed
        run: |
          git config user.name "astroblox-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/games.json)" ]; then
            git add data/games.json
            git commit -m "chore: auto-refresh games data ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed refreshed data."
          else
            echo "No changes in games.json."
          fi
